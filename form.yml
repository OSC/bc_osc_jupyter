---
form:
  - cluster
  - auto_accounts
  - mode
  - working_dir
  - bc_num_hours
  - node_type
  - gpus
  - auto_modules_cuda
  - num_cores
  - auto_modules_app_jupyter
  - bc_email_on_started
attributes:
  cluster:
    widget: select
    label: "Cluster"
    options:
      - ["cardinal", "cardinal"]
      - ["ascend", "ascend"]
      - ["pitzer", "pitzer"]
  auto_modules_app_jupyter:
    label: "JupyterLab version"
    default: false
  mode:
    widget: radio
    value: "1"
    options:
      - ["Jupyter Lab", "1"]
      - ["Jupyter Notebook", "0"]
  working_dir:
    widget: "path_selector"
    label: "Root directory"
    show_hidden: false
    show_files: false   # Only display directories
    help: "Select your project directory; defaults to $HOME"
  num_cores:
    widget: number_field
    label: "Number of cores"
    help: |
      Number of cores on node type. Minimums and maximums will change
      depending on the choice of node type and cluster.
    value: 1
    min: 1
    max: 16
    step: 1
  gpus:
    widget: number_field
    label: "GPUs"
    min: 0
    max: 4
  auto_modules_cuda:
    label: "CUDA version"
    default: false
  node_type:
    widget: select
    label: "Node type"
    options:
      - [
          "cpu", "batch",
          data-hide-auto-modules-cuda: true,
          data-set-auto-modules-cuda: '',
          data-hide-gpus: true,
          data-min-num-cores-for-cluster-cardinal: 1,
          data-max-num-cores-for-cluster-cardinal: 96,
          data-min-num-cores-for-cluster-ascend: 1,
          data-max-num-cores-for-cluster-ascend: 118,
          data-min-num-cores-for-cluster-pitzer: 1,
          data-max-num-cores-for-cluster-pitzer: 48,
        ]
      - [
          "gpu", "batch",
          data-hide-auto-modules-cuda: false,
          data-hide-gpus: false,
          data-min-num-cores-for-cluster-cardinal: 1,
          data-max-num-cores-for-cluster-cardinal: 96,
          data-min-num-cores-for-cluster-ascend: 1,
          data-max-num-cores-for-cluster-ascend: 120,
          data-min-num-cores-for-cluster-pitzer: 1,
          data-max-num-cores-for-cluster-pitzer: 48,
          data-min-gpus-for-cluster-cardinal: 1,
          data-max-gpus-for-cluster-cardinal: 4,
          data-min-gpus-for-cluster-ascend: 1,
          data-max-gpus-for-cluster-ascend: 4,
          data-min-gpus-for-cluster-pitzer: 1,
          data-max-gpus-for-cluster-pitzer: 2,
        ]
      - [
          "gpu-h100-94g", "gpu",
          data-hide-auto-modules-cuda: false,
          data-hide-gpus: false,
          data-option-for-cluster-ascend: false,
          data-option-for-cluster-pitzer: false,
          data-min-num-cores-for-cluster-cardinal: 1,
          data-max-num-cores-for-cluster-cardinal: 96,
          data-min-gpus-for-cluster-cardinal: 1,
          data-max-gpus-for-cluster-cardinal: 4,
        ]
      - [
          "gpu-a100-40g", "nextgen",
          data-hide-auto-modules-cuda: false,
          data-hide-gpus: false,
          data-option-for-cluster-cardinal: false,
          data-option-for-cluster-pitzer: false,
          data-min-num-cores-for-cluster-ascend: 1,
          data-max-num-cores-for-cluster-ascend: 120,
          data-min-gpus-for-cluster-ascend: 1,
          data-max-gpus-for-cluster-ascend: 4,
        ]
      - [
          "gpu-a100-80g", "quad",
          data-hide-auto-modules-cuda: false,
          data-hide-gpus: false,
          data-option-for-cluster-cardinal: false,
          data-option-for-cluster-pitzer: false,
          data-min-num-cores-for-cluster-ascend: 1,
          data-max-num-cores-for-cluster-ascend: 88,
          data-min-gpus-for-cluster-ascend: 1,
          data-max-gpus-for-cluster-ascend: 4,
        ]
      - [
          "gpu-v100-16gb", "gpu",
          data-hide-auto-modules-cuda: false,
          data-hide-gpus: false,
          data-option-for-cluster-cardinal: false,
          data-option-for-cluster-ascend: false,
          data-min-num-cores-for-cluster-pitzer: 1,
