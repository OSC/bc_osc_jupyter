---
form:
  - global_cluster
  - auto_accounts
  - mode
  - working_dir
  - bc_num_hours
  - global_node_type
  - gpus
  - auto_modules_cuda
  - num_cores
  - auto_modules_app_jupyter
  - bc_email_on_started
attributes:
  auto_modules_app_jupyter:
    label: "JupyterLab version"
    default: false
  mode:
    widget: radio
    value: "1"
    options:
      - ["Jupyter Lab", "1"]
      - ["Jupyter Notebook", "0"]
  working_dir:
    widget: "path_selector"
    label: "Root directory"
    show_hidden: false
    show_files: false   # Only display directories
    help: "Select your project directory; defaults to $HOME"
  num_cores:
    widget: number_field
    label: "Number of cores"
    help: |
      Number of cores on node type. Minimums and maximums will change
      depending on the choice of node type and cluster.
    value: 1
    step: 1
  gpus:
    widget: number_field
    label: "GPUs"
    values: 1
  auto_modules_cuda:
    label: "CUDA version"
    default: false
