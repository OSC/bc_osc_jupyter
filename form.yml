---
cluster:
  - "cardinal"
  - "ascend"
  - "pitzer"
form:
  - cluster
  - auto_accounts
  - mode
  - working_dir
  - bc_num_hours
  - node_type
  - gpus
  - auto_modules_cuda
  - num_cores
  - auto_modules_app_jupyter
  - bc_email_on_started
attributes:
  auto_modules_app_jupyter:
    label: "JupyterLab version"
    default: false
  mode:
    widget: radio
    value: "1"
    options:
      - ["Jupyter Lab", "1"]
      - ["Jupyter Notebook", "0"]
  working_dir:
    widget: "path_selector"
    label: "Root directory"
    show_hidden: false
    show_files: false   # Only display directories
    help: "Select your project directory; defaults to $HOME"
  num_cores:
    widget: number_field
    label: "Number of cores"
    help: |
      Number of cores on node type. Minimums and maximums will change
      depending on the choice of node type and cluster.
    value: 1
    step: 1
  gpus:
    widget: number_field
    label: "GPUs"
    values: 1
  auto_modules_cuda:
    label: "CUDA version"
    default: false
  node_type:
    widget: select
    label: "Node type"
    options:
      - [
          "any cpu", "cpu-batch",
          data-hide-auto-modules-cuda: true,
          data-set-auto-modules-cuda: '',
          data-hide-gpus: true,
          data-set-gpus: 0,
          data-min-gpus: 0,
          data-set-num-cores: 1,
          data-min-num-cores: 1,
          data-max-num-cores-for-cluster-cardinal: 96,
          data-max-num-cores-for-cluster-ascend: 118,
          data-max-num-cores-for-cluster-pitzer: 48,
          data-set-bc-num-slots: 1,
          data-min-bc-num-slots: 1,
          data-max-bc-num-slots-for-cluster-cardinal: 12,
          data-max-bc-num-slots-for-cluster-ascend: 16,
          data-max-bc-num-slots-for-cluster-pitzer: 36,
        ]
      - [
          "any gpu", "gpu-batch",
          data-hide-auto-modules-cuda: false,
          data-hide-gpus: false,
          data-set-gpus: 1,
          data-min-gpus: 1,
          data-max-gpus-for-cluster-cardinal: 4,
          data-max-gpus-for-cluster-ascend: 4,
          data-max-gpus-for-cluster-pitzer: 2,
          data-set-num-cores: 1,
          data-min-num-cores: 1,
          data-max-num-cores-for-cluster-cardinal: 96,
          data-max-num-cores-for-cluster-ascend: 120,
          data-max-num-cores-for-cluster-pitzer: 48,
          data-set-bc-num-slots: 1,
          data-min-bc-num-slots: 1,
          data-max-bc-num-slots-for-cluster-cardinal: 12,
          data-max-bc-num-slots-for-cluster-ascend: 16,
          data-max-bc-num-slots-for-cluster-pitzer: 6,
        ]
      # Cardinal GPU Nodes
      - [
          "gpu-h100-94g", "carinal-gpu",
          data-hide-auto-modules-cuda: false,
          data-hide-gpus: false,
          data-set-gpus-for-cluster-cardinal: 1,
          data-min-gpus-for-cluster-cardinal: 1,
          data-max-gpus-for-cluster-cardinal: 4,
          data-set-num-cores-for-cluster-cardinal: 1,
          data-min-num-cores-for-cluster-cardinal: 1,
          data-max-num-cores-for-cluster-cardinal: 96,
          data-set-bc-num-slots-for-cluster-cardinal: 1,
          data-min-bc-num-slots-for-cluster-cardinal: 1,
          data-max-bc-num-slots-for-cluster-cardinal: 12,
          data-option-for-cluster-ascend: false,
          data-option-for-cluster-pitzer: false,
        ]
      # Ascend GPU Nodes
      - [
          "gpu-a100-40g", "ascend-nextgen",
          data-hide-auto-modules-cuda: false,
          data-hide-gpus: false,
          data-set-gpus-for-cluster-ascend: 1,
          data-min-gpus-for-cluster-ascend: 1,
          data-max-gpus-for-cluster-ascend: 3,
          data-set-num-cores-for-cluster-ascend: 1,
          data-min-num-cores-for-cluster-ascend: 1,
          data-max-num-cores-for-cluster-ascend: 120,
          data-set-bc-num-slots-for-cluster-ascend: 1,
          data-min-bc-num-slots-for-cluster-ascend: 1,
          data-max-bc-num-slots-for-cluster-ascend: 16,
          data-option-for-cluster-cardinal: false,
          data-option-for-cluster-pitzer: false,
        ]
      - [
          "gpu-a100-80g", "ascend-quad",
          data-hide-auto-modules-cuda: false,
          data-hide-gpus: false,
          data-set-gpus-for-cluster-ascend: 1,
          data-min-gpus-for-cluster-ascend: 1,
          data-max-gpus-for-cluster-ascend: 4,
          data-set-num-cores-for-cluster-ascend: 1,
          data-min-num-cores-for-cluster-ascend: 1,
          data-max-num-cores-for-cluster-ascend: 88,
          data-set-bc-num-slots-for-cluster-ascend: 1,
          data-min-bc-num-slots-for-cluster-ascend: 1,
          data-max-bc-num-slots-for-cluster-ascend: 4,
          data-option-for-cluster-cardinal: false,
          data-option-for-cluster-pitzer: false,
        ]
      # Pitzer GPU Nodes
      - [
          "gpu-v100-16gb", "pitzer-gpu",
          data-hide-auto-modules-cuda: false,
          data-hide-gpus: false,
          data-set-gpus-for-cluster-pitzer: 1,
          data-min-gpus-for-cluster-pitzer: 1,
          data-max-gpus-for-cluster-pitzer: 2,
          data-set-num-cores-for-cluster-pitzer: 1,
          data-min-num-cores-for-cluster-pitzer: 1,
          data-max-num-cores-for-cluster-pitzer: 40,
          data-set-bc-num-slots-for-cluster-pitzer: 1,
          data-min-bc-num-slots-for-cluster-pitzer: 1,
          data-max-bc-num-slots-for-cluster-pitzer: 4,
          data-option-for-cluster-cardinal: false,
          data-option-for-cluster-ascend: false,
        ]
      - [
          "gpu-v100-32gb", "pitzer-gpu-exp",
          data-hide-auto-modules-cuda: false,
          data-hide-gpus: false,
          data-set-gpus-for-cluster-pitzer: 1,
          data-min-gpus-for-cluster-pitzer: 1,
          data-max-gpus-for-cluster-pitzer: 2,
          data-set-num-cores-for-cluster-pitzer: 1,
          data-min-num-cores-for-cluster-pitzer: 1,
          data-max-num-cores-for-cluster-pitzer: 48,
          data-set-bc-num-slots-for-cluster-pitzer: 1,
          data-min-bc-num-slots-for-cluster-pitzer: 1,
          data-max-bc-num-slots-for-cluster-pitzer: 6,
          data-option-for-cluster-cardinal: false,
          data-option-for-cluster-ascend: false,
        ]
      # Pitzer Large Memory Nodes
      - [
          "largemem", "pitzer-largemem",
          data-hide-auto-modules-cuda: true,
          data-set-auto-modules-cuda: '',
          data-hide-gpus: true,
          data-set-gpus: 0,
          data-min-gpus: 0,
          data-set-num-cores-for-cluster-pitzer: 24,
          data-min-num-cores-for-cluster-pitzer: 24,
          data-max-num-cores-for-cluster-pitzer: 48,
          data-set-bc-num-slots-for-cluster-pitzer: 1,
          data-min-bc-num-slots-for-cluster-pitzer: 1,
          data-max-bc-num-slots-for-cluster-pitzer: 1,
          data-option-for-cluster-cardinal: false,
          data-option-for-cluster-ascend: false,
        ]
      - [
          "hugemem", "pitzer-hugemem",
          data-hide-auto-modules-cuda: true,
          data-set-auto-modules-cuda: '',
          data-hide-gpus: true,
          data-set-gpus: 0,
          data-min-gpus: 0,
          data-set-num-cores-for-cluster-pitzer: 20,
          data-min-num-cores-for-cluster-pitzer: 20,
          data-max-num-cores-for-cluster-pitzer: 80,
          data-set-bc-num-slots-for-cluster-pitzer: 1,
          data-min-bc-num-slots-for-cluster-pitzer: 1,
          data-max-bc-num-slots-for-cluster-pitzer: 1,
          data-option-for-cluster-cardinal: false,
          data-option-for-cluster-ascend: false,
        ]
      # Cardinal Huge Memory Nodes
      - [
          "hugemem", "cardinal-hugemem",
          data-hide-auto-modules-cuda: true,
          data-set-auto-modules-cuda: '',
          data-hide-gpus: true,
          data-set-gpus: 0,
          data-min-gpus: 0,
          data-set-num-cores-for-cluster-cardinal: 48,
          data-min-num-cores-for-cluster-cardinal: 48,
          data-max-num-cores-for-cluster-cardinal: 96,
          data-set-bc-num-slots-for-cluster-cardinal: 1,
          data-min-bc-num-slots-for-cluster-cardinal: 1,
          data-max-bc-num-slots-for-cluster-cardinal: 1,
          data-option-for-cluster-ascend: false,
          data-option-for-cluster-pitzer: false,
        ]
